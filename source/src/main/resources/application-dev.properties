# **********************************
# * api-financiamentos-simul - DEV *
# **********************************
server.tomcat.max-threads=8
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration

#origens-solicitacao.gravar-simulacao-simplificada=ABRADIT,INSTITUCIONAL,LANDING_PAGE,CRED_FACIL_INSTITUCIONAL,CRED_INTELIGENTE_INSTITUCIONAL,TDB

# Tempo de espera antes de sair da JVM uma vez que o sinal para terminar e recebido
# Tem que ser maior que o periodSeconds do readiness probe do OpenShift para que da tempo do OpenShift parar de enviar
# requests e tambem de terminar os ultimos requests recebidos.

estaGracefulShutdownWaitSeconds=60
# ----------------------------------------------------------------------------------------------------------------------
# *************
# * SIMULADOR *
# *************
simulador.debug.retornar-request=true
simulador.max-requests-externos=2
simulador.subsidio-minimo-por-valor=10

# porcentagem
simulador.desejada.max-diferenca=5

simulador.intermediaria.max-porcentual=8

simulacao-simplificada-parceiros.enabled=true
# ----------------------------------------------------------------------------------------------------------------------
# *********
# * REDIS *
# *********
# Quando estiver em ambiente NAO LOCAL (DEV, PROD, HML) use os seguintes host e porta do reddis
# (COMENTE O HOST E PORTA USADOS LOCALMENTE QUANDO APONTA PARA DEV ANTES DE COMMITAR!!!)
spring.redis.host=redis.new-front-dev.svc.cluster.local
spring.redis.port=6379

# Quando for debuggar local apontando para DEV utilizar esses host e porta para o Redis
# (DEIXE COMENTADOS O HOST E A PORTA USADOS LOCALMENTE AQUI ANTES DE COMMITAR!!!)
